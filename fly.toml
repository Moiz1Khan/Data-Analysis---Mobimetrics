# Mobimetrics API on Fly.io
# 1) Install CLI: https://fly.io/docs/hands-on/install-flyctl/
# 2) From repo root: fly auth login && fly launch --no-deploy (or fly launch to deploy in one step)
# 3) fly secrets set ALLOWED_ORIGINS="https://your-app.vercel.app"
# 4) fly deploy

app = "mobimetrics-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
